<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Scrap Metal Pickup | Donovan Metal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        metal: {
                            900: '#0f172a',
                            700: '#334155',
                            accent: '#ef4444' // Updated to Red
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-metal-900 text-gray-200 font-sans antialiased">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-metal-900 border-b border-metal-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <img src="./logo.png" alt="Donovan Metal" class="h-16 w-auto">
                </div>
                <div class="hidden md:block">
                    <button onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})" class="bg-metal-accent text-white px-6 py-2 rounded-full hover:bg-red-700 transition">Contact Us</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-32 pb-16 px-4">
        <div class="max-w-5xl mx-auto">
            <div class="aspect-video bg-gray-800 rounded-2xl overflow-hidden shadow-2xl border-2 border-metal-700">
                <img src="./band.png" alt="Heavy Metal Band" class="w-full h-full object-cover">
            </div>
            <div class="text-center mt-8">
                <h1 class="text-4xl md:text-6xl font-black text-white mb-4">FREE PICK UP OF ALL METALS</h1>
                <p class="text-xl text-gray-400">Refrigerator, washing machines, dryers and all unwanted metals.</p>
            </div>
        </div>
    </section>

    <!-- What We Take -->
    <section id="services" class="py-16 px-4">
        <div class="max-w-5xl mx-auto">
            <h2 class="text-3xl font-bold text-white text-center mb-12">The Hit List</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-metal-700 p-8 rounded-xl border border-metal-accent text-center">
                    <img src="./refrigerators.png" alt="Refrigerators" class="h-40 w-auto mx-auto mb-4">
                    <h3 class="text-xl font-bold text-white">Refrigerators</h3>
                </div>
                <div class="bg-metal-700 p-8 rounded-xl border border-metal-accent text-center">
                    <img src="./washers.png" alt="Washers & Dryers" class="h-40 w-auto mx-auto mb-4">
                    <h3 class="text-xl font-bold text-white">Washers & Dryers</h3>
                </div>
                <div class="bg-metal-700 p-8 rounded-xl border border-metal-accent text-center">
                    <img src="./autoparts.png" alt="Auto Parts" class="h-40 w-auto mx-auto mb-4">
                    <h3 class="text-xl font-bold text-white">Auto Parts</h3>
                </div>
                <div class="bg-metal-700 p-8 rounded-xl border border-metal-accent text-center">
                    <img src="./scrapmetals.png" alt="All Scrap Metal" class="h-40 w-auto mx-auto mb-4">
                    <h3 class="text-xl font-bold text-white">All Scrap Metal</h3>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <footer id="contact" class="bg-black py-16 px-4 text-center">
        <h2 class="text-2xl font-bold text-white mb-6">Ready to haul?</h2>
        <a href="tel:+254700000000" class="inline-block bg-metal-accent text-white px-8 py-4 rounded-lg font-bold text-lg hover:bg-red-700 transition">Call Now</a>
    </footer>

</body>
</html>
